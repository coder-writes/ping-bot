name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            export PATH="/home/ubuntu/.nvm/versions/node/v24.14.1/bin:$PATH"

            echo "Node:"
            which node
            node -v

            echo "NPM:"
            which npm
            npm -v

            echo "PM2:"
            which pm2

            cd /home/ubuntu/ping-bot

            git pull origin main

            npm install

            pm2 restart ping-bot

            pm2 status